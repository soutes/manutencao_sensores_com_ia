services:
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]
    # GPU (16GB) - requer nvidia-container-toolkit:
    # deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --app-dir src
    ports: ["8000:8000"]
    environment:
      - LLM_BACKEND=ollama
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=qwen2.5:7b
    volumes: ["./artifacts:/app/artifacts", "./data:/app/data"]
    depends_on: [ollama]

  app:
    build: .
    command: streamlit run src/app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports: ["8501:8501"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes: ["./artifacts:/app/artifacts", "./data:/app/data"]
    depends_on: [api]

  # bot:
  #   build: .
  #   command: python src/bot/telegram_bot.py
  #   environment:
  #     - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
  #     - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
  #     - OLLAMA_HOST=http://ollama:11434
  #   volumes: ["./artifacts:/app/artifacts", "./data:/app/data"]
  #   depends_on: [api]

volumes:
  ollama:
