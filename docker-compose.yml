services:
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]
    # GPU (16GB) - requer nvidia-container-toolkit:
    # deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  api:
    build: .
    command: poetry run uvicorn api.main:app --host 0.0.0.0 --port 8000 --app-dir src
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=qwen2.5:7b
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    depends_on: [ollama]

  app:
    build: .
    command: poetry run streamlit run src/app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports: ["8501:8501"]
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    depends_on: [api]

  bot:
    build: .
    command: poetry run python src/bot/telegram_bot.py
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    depends_on: [api]
    profiles: ["bot"]   # nao sobe por padrao; usar: docker compose --profile bot up

volumes:
  ollama:
